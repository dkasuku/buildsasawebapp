
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>ConstructAI Platform Design</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }
        html.theme-light { background: #F7F8FA; }
        html:not(.theme-light) { background: #0A0E14; }
      </style>
      <script>
        (function() {
          try {
            var t = localStorage.getItem("constructai-theme");
            if (t === "light") document.documentElement.classList.add("theme-light");
          } catch(e) {}
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
