version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: constructai
      POSTGRES_PASSWORD: constructai
      POSTGRES_DB: constructai
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constructai"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://constructai:constructai@db:5432/constructai
      JWT_SECRET: change-me
      AUTH_REQUIRED: "true"
      PORT: 5000
    ports:
      - "5000:5000"
    command: ["sh", "-c", "npx prisma migrate deploy && node src/server.js"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_started

volumes:
  db_data:
